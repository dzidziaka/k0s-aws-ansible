---
plugin: amazon.aws.aws_ec2
regions:
  - eu-west-1

filters:
  "tag:ManagedBy": "Ansible"
  "tag:Project": "k8s-cluster"
  instance-state-name: running

compose:
  ansible_host: public_ip_address
  ansible_user: ubuntu
  ansible_ssh_private_key_file: "~/.ssh/id_rsa"

groups:
  k8s_master: '"master" in tags.Role'
  k8s_workers: '"worker" in tags.Role'
  k8s_all: true
