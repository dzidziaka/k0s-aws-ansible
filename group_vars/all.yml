---
# group_vars/all.yml

# ── AWS ──────────────────────────────────────────────────────────────────────
aws_region: "{{ lookup('env', 'AWS_DEFAULT_REGION') | default('eu-west-1', true) }}"
aws_key_pair: "{{ lookup('env', 'AWS_KEY_PAIR_NAME') | default('k8s-keypair', true) }}"

vpc_cidr: "10.0.0.0/16"
subnet_cidr: "10.0.1.0/24"
availability_zone: "{{ aws_region }}a"

ec2_instance_type: "t3.small"
ec2_ami_id: "ami-09d0c9a85bf1b9ea7"
ec2_volume_size: 30
ec2_volume_type: "gp3"

# ── Cluster ───────────────────────────────────────────────────────────────────
cluster_name: "k8s-cluster"
k8s_pod_network_cidr: "192.168.0.0/16"
k8s_service_cidr: "10.96.0.0/12"

# ── Versions ──────────────────────────────────────────────────────────────────
k0s_version: "v1.29.3+k0s.0"

# ── SSH / connection ──────────────────────────────────────────────────────────
ansible_user: ubuntu
ansible_ssh_private_key_file: "~/.ssh/id_rsa"
ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

# ── Tags ──────────────────────────────────────────────────────────────────────
common_tags:
  Project: "{{ cluster_name }}"
  ManagedBy: "Ansible"
  Environment: "production"
