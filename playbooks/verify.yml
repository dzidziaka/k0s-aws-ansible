---
# playbooks/verify.yml

- name: Verify k0s cluster health
  hosts: k8s_master
  gather_facts: false
  become: false
  remote_user: ubuntu

  environment:
    KUBECONFIG: "/home/ubuntu/admin.conf"

  tasks:
    - name: Check k0s controller status
      ansible.builtin.command: k0s status
      changed_when: false
      become: true
      register: k0s_status_out

    - name: Show k0s status
      ansible.builtin.debug:
        msg: "{{ k0s_status_out.stdout_lines }}"

    - name: Get cluster nodes
      ansible.builtin.command: k0s kubectl get nodes -o wide
      register: nodes_output
      changed_when: false

    - name: Print nodes
      ansible.builtin.debug:
        msg: "{{ nodes_output.stdout_lines }}"

    - name: Verify all nodes are Ready
      ansible.builtin.shell:
        cmd: |
         k0s  kubectl get nodes --no-headers | awk '{print $2}' | grep -v "^Ready$" || true
      register: not_ready
      changed_when: false

    - name: Assert all nodes Ready
      ansible.builtin.assert:
        that:
          - not_ready.stdout == ""
        fail_msg: "Some nodes are not Ready"
        success_msg: "All nodes are Ready!"

    - name: Get system pods
      ansible.builtin.command: k0s kubectl get pods -A
      register: pods_output
      changed_when: false

    - name: Print system pods
      ansible.builtin.debug:
        msg: "{{ pods_output.stdout_lines }}"

    - name: Show cluster info
      ansible.builtin.command: k0s kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Print cluster info
      ansible.builtin.debug:
        msg: "{{ cluster_info.stdout_lines }}"

    - name: Show resource usage
      ansible.builtin.command: k0s kubectl top nodes
      register: top_nodes
      changed_when: false
      failed_when: false

    - name: Print resource usage
      ansible.builtin.debug:
        msg: "{{ top_nodes.stdout_lines }}"
