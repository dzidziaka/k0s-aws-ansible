---
# playbooks/destroy.yml
# Tears down all AWS resources created by provision.yml
# CAUTION: This is destructive and irreversible!

- name: Destroy AWS infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: Confirm destruction
      ansible.builtin.pause:
        prompt: |
          !!WARNING!! You are about to DESTROY the cluster "{{ cluster_name }}".
          All data will be lost. Type YES to continue

      register: confirm
      when: not (auto_approve | default(false) | bool)

    - name: Abort if not confirmed
      ansible.builtin.fail:
        msg: "Destruction aborted."
      when:
        - not (auto_approve | default(false) | bool)
        - confirm.user_input != "YES"

    - name: Gather EC2 instances for cluster
      amazon.aws.ec2_instance_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Project": "{{ cluster_name }}"
          "tag:ManagedBy": "Ansible"
      register: ec2_instances

    - name: Terminate EC2 instances
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        instance_ids: "{{ ec2_instances.instances | map(attribute='instance_id') | list }}"
        state: absent
        wait: true
      when: ec2_instances.instances | length > 0

    - name: Delete security group
      amazon.aws.ec2_security_group:
        name: "{{ cluster_name }}-sg"
        region: "{{ aws_region }}"
        state: absent

    - name: Gather VPC info
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          "tag:Project": "{{ cluster_name }}"
      register: vpc_info

    - name: Delete route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc_info.vpcs[0].id }}"
        region: "{{ aws_region }}"
        state: absent
        lookup: tag
        tags:
          Name: "{{ cluster_name }}-rt"
      when: vpc_info.vpcs | length > 0
      ignore_errors: true

    - name: Delete subnet
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc_info.vpcs[0].id }}"
        cidr: "{{ subnet_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when: vpc_info.vpcs | length > 0

    - name: Delete Internet Gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc_info.vpcs[0].id }}"
        region: "{{ aws_region }}"
        state: absent
      when: vpc_info.vpcs | length > 0

    - name: Delete VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ cluster_name }}-vpc"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        state: absent
      when: vpc_info.vpcs | length > 0

    - name: Clean up local kubeconfig
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../kubeconfig"
        state: absent
      delegate_to: localhost

    - name: Done
      ansible.builtin.debug:
        msg: "Cluster {{ cluster_name }} has been destroyed."
